version: '3.8'
services:
  app:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    volumes:
      - ./templates:/app/templates:ro
      - ./generated:/app/generated
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
